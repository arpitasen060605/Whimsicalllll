<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneCanvas 🎵</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-screen" id="loginScreen">
    <h1 class="site-title">TuneCanvas</h1>
    <p class="site-subtitle">Paint your Playlist✨</p>
    <button id="googleSignInBtn" class="landing-btn primary">sign in with Google</button>
</div>

    <!-- LANDING SCREEN -->
    <div class="landing hidden" id="landingScreen">
        <h1 class="site-title">TuneCanvas</h1>
        <p class="site-subtitle">Paint your Playlist✨</p>

        <div class="landing-actions">
            <button id="createRoomBtn" class="landing-btn primary">+ create a room</button>
            <button id="showJoinBtn" class="landing-btn secondary">join a room</button>
        </div>

        <div class="join-form" id="joinForm">
            <input type="text" id="joinCodeInput" placeholder="e.g. VIBE-4829" maxlength="9" />
            <button id="joinRoomBtn" class="landing-btn primary">enter</button>
        </div>
    </div>

    <!-- APP SCREEN (your card builder) -->
    <div class="page-wrapper hidden" id="appScreen">
     <div class="room-bar">
      <span class="room-code-label">room</span>
      <span class="room-code" id="roomCodeDisplay">—</span>
      <button id="copyCodeBtn" class="copy-btn" title="copy code">copy</button>
      <button id="newCardBtn" class="copy-btn" title="create a new playlist">+ new playlist</button>
      <button id="signOutBtn" class="copy-btn" title="sign out">sign out</button>
     </div> 

     <div class="wall" id="wallContainer"></div>
       
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button type="button" class="modal-close" id="modalClose">✕</button>
            <h3 class="modal-heading">create your card</h3>

            <form id="cardForm">
                <label for="inputCreator">your name</label>
                <input id="inputCreator" type="text" placeholder="arpita" />

                <label for="inputTitle">playlist name</label>
                <input id="inputTitle" type="text" placeholder="late night drives" />

                <label for="inputDesc">tiny note</label>
                <textarea id="inputDesc" rows="2" placeholder="songs for windows-down, no destination moments 🌙"></textarea>

                <label>mood</label>
                <div class="mood-picker" id="moodPicker">
                    <button type="button" class="mood-option" data-mood="dreamy" data-emoji="☁️">dreamy</button>
                    <button type="button" class="mood-option" data-mood="golden" data-emoji="🌅">golden</button>
                    <button type="button" class="mood-option" data-mood="moody" data-emoji="🌧️">moody</button>
                    <button type="button" class="mood-option" data-mood="chill" data-emoji="🍃">chill</button>
                    <button type="button" class="mood-option" data-mood="fiery" data-emoji="🔥">fiery</button>
                </div>

                <label>songs</label>
                <div id="songRows" class="song-rows"></div>
                <button type="button" id="addSongBtn" class="add-song-btn">+ add song</button>

                <button type="submit" class="save-btn">save card</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
