<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneCanvas 🎵</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="page-wrapper">
        <h1 class="site-title">TuneCanvas</h1>
        <p class="site-subtitle">Paint your Playlist✨</p>

        
        <div class="card">
            <button id="openModalBtn" class="edit-btn" title="edit card">✎</button>
            <div class="card-header">
                <span class="card-mood">☁️Dreamy</span>
                <span class="card-creator">by arpita</span>
            </div>
            

            <h2 class="card-title">late night drives</h2>
            <p class="card-desc">songs for windows-down, no destination moments 🌙</p>

            <div class="song-list">
                <div class="song">
                    <span class="song-num">01</span>
                    <div class="song-info">
                        <span class="song-title">Midnight Rain</span>
                        <span class="song-artist">Taylor Swift</span>
                    </div>
                </div>
                <div class="song">
                    <span class="song-num">02</span>
                    <div class="song-info">
                        <span class="song-title">Golden Hour</span>
                        <span class="song-artist">JVKE</span>
                    </div>
                </div>
                <div class="song">
                    <span class="song-num">03</span>
                    <div class="song-info">
                        <span class="song-title">Lavender Haze</span>
                        <span class="song-artist">Taylor Swift</span>
                    </div>
                </div>
                <div class="song">
                    <span class="song-num">04</span>
                    <div class="song-info">
                        <span class="song-title">From the Start</span>
                        <span class="song-artist">Laufey</span>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <span class="song-count">4 songs</span>
                <span class="card-tag">🎨 TuneCanvas</span>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button type="button" class="modal-close" id="modalClose">✕</button>
            <h3 class="modal-heading">create your card</h3>

            <form id="cardForm">
                <label for="inputCreator">your name</label>
                <input id="inputCreator" type="text" placeholder="arpita" />

                <label for="inputTitle">playlist name</label>
                <input id="inputTitle" type="text" placeholder="late night drives" />

                <label for="inputDesc">tiny note</label>
                <textarea id="inputDesc" rows="2" placeholder="songs for windows-down, no destination moments 🌙"></textarea>

                <label>mood</label>
                <div class="mood-picker" id="moodPicker">
                    <button type="button" class="mood-option" data-mood="dreamy" data-emoji="☁️">dreamy</button>
                    <button type="button" class="mood-option" data-mood="golden" data-emoji="🌅">golden</button>
                    <button type="button" class="mood-option" data-mood="moody" data-emoji="🌧️">moody</button>
                    <button type="button" class="mood-option" data-mood="chill" data-emoji="🍃">chill</button>
                    <button type="button" class="mood-option" data-mood="fiery" data-emoji="🔥">fiery</button>
                </div>

                <label>songs</label>
                <div id="songRows" class="song-rows"></div>
                <button type="button" id="addSongBtn" class="add-song-btn">+ add song</button>

                <button type="submit" class="save-btn">save card</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
